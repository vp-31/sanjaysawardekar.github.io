  <circle cx="32" cy="32" r="29" fill="none" stroke="#C8963E" stroke-width="1.5"/>

  <!-- SS Monogram in Gold -->
  <text x="32" y="39" text-anchor="middle" dominant-baseline="middle"
        font-family="'Playfair Display', 'Georgia', serif"
